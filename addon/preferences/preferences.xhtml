<vbox id="zotero-ai-notes-preferences-pane"
      xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
      xmlns:html="http://www.w3.org/1999/xhtml">
  <groupbox>
    <label><html:h2>Gemini 配置</html:h2></label>
    <description>API Key 只保存在本机凭据库，不会写入日志或调试文件。</description>

    <html:label for="zotero-ai-notes-base-url">Base URL</html:label>
    <html:input id="zotero-ai-notes-base-url" type="url"
                preference="extensions.zotero.aiNotes.baseURL"/>

    <html:label for="zotero-ai-notes-api-key">API Key</html:label>
    <html:input id="zotero-ai-notes-api-key" type="password"
                placeholder="未配置" autocomplete="off"/>
    <html:small id="zotero-ai-notes-api-key-status"></html:small>

    <html:label for="zotero-ai-notes-model">模型</html:label>
    <html:input id="zotero-ai-notes-model" type="text"
                preference="extensions.zotero.aiNotes.model"/>

    <hbox class="zotero-ai-notes-button-row">
      <button id="zotero-ai-notes-save" label="保存"/>
      <button id="zotero-ai-notes-test" label="测试连接"/>
      <button id="zotero-ai-notes-clear-key" label="清除 API Key"/>
    </hbox>
    <description id="zotero-ai-notes-result"></description>
  </groupbox>
</vbox>
